name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare dist
        run: |
          mkdir -p dist
          # Ship every top-level HTML / JS / CSS / SVG — easier to keep
          # honest than a hand-maintained filename list. The Worker
          # sub-directory and research/dev artefacts are excluded by
          # virtue of not matching the globs.
          cp *.html *.js *.css *.svg dist/
          ls -la dist/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4

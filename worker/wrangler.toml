name = "skywave-gateway"
main = "src/index.js"
compatibility_date = "2025-01-01"
workers_dev = true

[observability]
enabled = true

# v2: one Durable Object per KiwiSDR channel, plus a singleton for
# receiver-list refresh + per-region rack composition. See PLAN.md.
[[durable_objects.bindings]]
name = "RECEIVER"
class_name = "ReceiverDO"

[[durable_objects.bindings]]
name = "DIRECTORY"
class_name = "DirectoryDO"

# TDOADO — singleton that fans in detections from every ReceiverDO and
# runs the cross-correlation + hyperboloid solve when ≥3 receivers hear
# the same packet.
[[durable_objects.bindings]]
name = "TDOA"
class_name = "TDOADO"

# SQLite-backed DO classes — the default after 2025-01-01 compat date,
# but be explicit so migrations survive compat-date bumps.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["ReceiverDO", "DirectoryDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["TDOADO"]
